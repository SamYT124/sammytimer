<!DOCTYPE html>
<html>
    <head>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
                overflow: hidden; 
                user-select: none;
            }
            body {
                font-family: sans-serif;
                background-color: black;
                color: white; 
            }
            h1 {
                font-size: clamp(2rem, 19.53vw, 31.25rem);
                text-align: center;
                position: fixed;
                left: 0;
                width: 100%;
                top: 0;
            }
            .stats {
                position: absolute;
                bottom: 20px;
                right: 20px;
                text-align: right; 
            }
            .botrig {
                margin: 5px 0; 
                font-size: clamp(1.5rem, 2vw, 3.125rem);
                font-weight: normal; 
            }
            .setbtn {
                margin: 5px 0; 
                font-size: clamp(1.125rem, 0.925rem + 1vw, 1.5625rem);
                font-weight: normal; 
            }
            .btmlbtn {
                position: absolute;
                bottom: 20px;
                left: 20px;
                text-align: left; 
            }
            .toprbtn {
                position: absolute;
                top: 20px;
                right: 20px;
                text-align: left; 
            }
            .centertext {
                text-align: center;
            }
            .scramble {
                text-align: center;
                font-size: 50px;
                max-width: 1500px;
                width: 100%;  
                margin: 0 auto; 
            }
            .modal-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 20px;
            }

            .modal-header h2 {
                margin: 0;
                font-size: 20px;
            }
            .label {
                font-size: 20px;
                font-weight: bold;
            }
            dialog {
                border: none;
                border-radius: 8px;
                padding: 24px;
                width: 90%;
                max-width: 400px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            }
        </style>
        <title>SammyTimer v0.8</title>
    </head>
    <body>
        <h3 class="scramble" id="scramble">scramble</h3>
        <h1 id="stopw">0.00</h1>
        <p class="centertext">bad cubing timer - made by sam</p>
        <div class="stats">
            <h3 class="botrig" id="ao5">Ao5: - </h3>
            <h3 class="botrig" id="ao12">Ao12: - </h3>
            <h3 class="botrig" id="ao50">Ao50: - </h3>
            <h3 class="botrig" id="best">Best: - </h3>
            <h3 class="botrig" id="mean">Mean: - </h3>
            <h3 class="botrig" id="count">Count: - </h3>
        </div>
        <div class="btmlbtn">
            <button id="dellast" class="botrig">Delete Last Solve</button>
            <button id="penalty" class="botrig">Mark +2</button>
            <button id="openSettingsBtn" class="botrig">Settings</button>
        </div>
        <dialog id="settings">
            <div class="modal-header">
                <h2>Settings</h2>
                <button id="closeSettingsBtn" class="close-btn">&times;</button>
            </div>
            <div class="setting-item">
                <label class="label">🖵 UI:</label>
                <div>
                    <button id="bgPickerButton" class="setbtn">BG Color</button>
                    <button id="textPickerButton" class="setbtn">Text Color</button>
                    <input type="color" id="bgColorPicker" value="#4A90E2" style="display: none;">
                    <input type="color" id="textColorPicker" value="#4A90E2" style="display: none;">
                    <button id="btnPickerButton" class="setbtn">Button BG Color</button>
                    <input type="color" id="btnColorPicker" value="#4A90E2" style="display: none;">
                    <button id="btntxtPickerButton" class="setbtn">Button Text Color</button>
                    <input type="color" id="btntxtColorPicker" value="#4A90E2" style="display: none;">
                    <br>
                    <label class="label">Font : </label>
                    <select id="font" class="setbtn">
                        <option value="roboto">Roboto</option>
                        <option value="verdana">Verdana</option>
                        <option value="courn">Courier New</option>
                        <option value="georgia">Georgia</option>
                        <option value="tnr">Times New Roman</option>
                        <option value="trebuchet">Trebuchet MS</option>
                    </select>
                </div> 

            </div>
        </dialog>
        <div class="toprbtn">
            <label class="botrig">Cube : </label>
            <select id="cube" class="botrig">
                <option value="3x3">3x3</option>
                <option value="2x2">2x2</option>
                <option value="4x4">4x4</option>
                <option value="5x5">5x5</option>
                <option value="6x6">6x6</option>
                <option value="7x7">7x7</option>
                <option value="skewb">Skewb</option>
                <option value="pyra">Pyraminx</option>
                <option value="sq1">Square-1</option>
                <option value="mega">Megaminx</option>
                <option value="clock">Clock</option>
            </select>
        </div>
    </body>
    <script src="./code.js"></script>
</html>
